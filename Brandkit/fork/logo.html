<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700;800&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 1024px;
    height: 1024px;
    background: #111111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
  }
  svg { display: block; }
</style>
</head>
<body>
  <svg width="480" height="480" viewBox="0 0 480 480" fill="none">
    <!-- flat 4-prong fork: offset shadow, then a solid inflated white silhouette
         (no per-piece stroke, so seams between tines/neck/handle don't show),
         then the main colored fork on top -->
    <g fill="#6D28D9">
      <rect x="135" y="84" width="28" height="140" rx="7"/>
      <rect x="205" y="84" width="28" height="140" rx="7"/>
      <rect x="275" y="84" width="28" height="140" rx="7"/>
      <rect x="345" y="84" width="28" height="140" rx="7"/>
      <rect x="135" y="224" width="238" height="40" rx="10"/>
      <rect x="224" y="260" width="60" height="170" rx="14"/>
    </g>
    <g fill="#F5F0FF">
      <rect x="115" y="64" width="40" height="152" rx="13"/>
      <rect x="185" y="64" width="40" height="152" rx="13"/>
      <rect x="255" y="64" width="40" height="152" rx="13"/>
      <rect x="325" y="64" width="40" height="152" rx="13"/>
      <rect x="115" y="204" width="250" height="52" rx="16"/>
      <rect x="204" y="240" width="72" height="182" rx="20"/>
    </g>
    <g fill="#A855F7">
      <rect x="121" y="70" width="28" height="140" rx="7"/>
      <rect x="191" y="70" width="28" height="140" rx="7"/>
      <rect x="261" y="70" width="28" height="140" rx="7"/>
      <rect x="331" y="70" width="28" height="140" rx="7"/>
      <rect x="121" y="210" width="238" height="40" rx="10"/>
      <rect x="210" y="246" width="60" height="170" rx="14"/>
    </g>
  </svg>
</body>
</html>
