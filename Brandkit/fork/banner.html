<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 2560px;
    height: 1440px;
    background: #111111;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .safe {
    width: 1546px;
    height: 423px;
    display: flex;
    align-items: center;
    gap: 56px;
  }
  .mark { flex-shrink: 0; }
  .content { display: flex; flex-direction: column; }
  .title {
    color: #F5F0FF;
    font-size: 110px;
    font-weight: 800;
    letter-spacing: -3px;
    line-height: 1;
  }
  .title .dot { color: #A855F7; }
  .bullets {
    margin-top: 34px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .bullet {
    color: #B8B8B8;
    font-size: 27px;
    font-weight: 500;
  }
  .bullet .arrow { color: #A855F7; font-weight: 700; margin-right: 14px; }
</style>
</head>
<body>
  <div class="safe">
    <div class="mark">
      <svg width="200" height="200" viewBox="0 0 480 480" fill="none">
        <defs>
          <g id="forkShape">
            <rect x="121" y="70" width="28" height="140" rx="7"/>
            <rect x="191" y="70" width="28" height="140" rx="7"/>
            <rect x="261" y="70" width="28" height="140" rx="7"/>
            <rect x="331" y="70" width="28" height="140" rx="7"/>
            <rect x="121" y="210" width="238" height="40" rx="10"/>
            <rect x="210" y="246" width="60" height="170" rx="14"/>
          </g>
          <filter id="forkOutline" x="-20%" y="-20%" width="140%" height="140%">
            <feMorphology in="SourceAlpha" operator="dilate" radius="6" result="dilated"/>
            <feFlood flood-color="#F5F0FF" result="white"/>
            <feComposite in="white" in2="dilated" operator="in"/>
          </filter>
        </defs>
        <use href="#forkShape" fill="#6D28D9" transform="translate(14,14)"/>
        <use href="#forkShape" filter="url(#forkOutline)"/>
        <use href="#forkShape" fill="#A855F7"/>
      </svg>
    </div>
    <div class="content">
      <div class="title">fork<span class="dot">.</span>ai</div>
      <div class="bullets">
        <div class="bullet"><span class="arrow">&gt;</span>AI &amp; tech news, forked daily.</div>
      </div>
    </div>
  </div>
</body>
</html>
