# Pipeline settings. Tweak without touching code.

# Channel identity (used subtly on the outro/watermark — NOT for slide theming;
# slide colors are chosen per-post to match the news subject).
channel:
  name: "Midnight Curiosity"
  handle: "@midnight.curiosity"
  logo: "assets/logo.png"     # optional; drop the moon logo here to show on outro

# How many posts to produce per daily run.
posts_per_day: 3

# Target platforms for the assisted export (Phase 4).
platforms:
  - youtube
  - tiktok
  - instagram

# Video output geometry (vertical short).
video:
  width: 1080
  height: 1920
  fps: 30
  # Slide pacing is reading-time aware: each slide is held long enough to read
  # its text (headline + bullets), so dense slides don't flash by. The hold is
  # clamped to [seconds_per_slide, max_seconds_per_slide]. TTS narration, when
  # present, is never cut short even past the cap.
  seconds_per_slide: 4.0       # MINIMUM hold per slide (floor for sparse slides)
  reading_speed_wpm: 200       # assumed comfortable on-screen reading speed
  read_lead_seconds: 0.8       # entrance-animation settle before reading starts
  max_seconds_per_slide: 8.0   # cap so one dense slide can't run away
  # A pre-made outro image appended to the end of every video and as the final
  # carousel swipe. Auto-detected from assets/ (e.g. EndingSlide.png / outro.png)
  # when `endslide` is unset; set a path here to pin a specific file, or "" to
  # disable. endslide_seconds is how long it holds on screen.
  # endslide: assets/EndingSlide.png
  endslide_seconds: 2.5

# Audio for rendered videos (Phase 3).
audio:
  # mode: silent | music | tts
  #   silent -> on-screen text only
  #   music  -> royalty-free bed from music_dir (first track), trimmed to length
  #   tts    -> narrate each slide's voiceover line; mixes a ducked music bed if present
  mode: silent
  music_dir: assets/music
  music_volume: 0.18          # music mode bed volume
  tts:
    # Command template: narration text arrives on STDIN; write audio to {out}.
    # Pick a HUMANLIKE, free engine (not robotic). Examples:
    #   Piper (local, free):     piper --model en_US-amy-medium.onnx --output_file {out}
    #   edge-tts (online, free): edge-tts --voice en-US-AvaNeural --write-media {out} --text-file /dev/stdin
    command: "piper --model en_US-amy-medium.onnx --output_file {out}"
    pad_seconds: 0.6          # silence padding added to each slide's narration
    music_volume: 0.12        # ducked bed volume under narration

# Claude generation (Phase 2).
model:
  # backend: how we call Claude.
  #   claude_cli -> shells out to the `claude` CLI under your Claude Pro/Max
  #                 subscription (no metered API key; cheapest). Requires Claude
  #                 Code installed + `claude login` on the host.
  #   api        -> direct Anthropic API (needs ANTHROPIC_API_KEY), forced tool
  #                 use + prompt caching.
  #   local      -> OpenAI-compatible chat-completions server on localhost
  #                 (Ollama/LM Studio/vLLM); zero marginal cost.
  #   openai_compat -> any remote OpenAI-compatible endpoint (OpenRouter,
  #                 NVIDIA NIM, etc.); needs api_key_env set in the env.
  backend: claude_cli
  cli_model: sonnet            # alias passed to `claude --model` (claude_cli)
  name: claude-sonnet-4-6      # model id for the api backend
  max_tokens: 4096
  prompt_cache: true           # api backend only
  timeout_seconds: 180         # per-generation CLI timeout
  local:
    base_url: "http://127.0.0.1:11434/v1"
    model: "qwen3-30b-a3b"
  openai_compat:
    # OpenRouter preset. openai/gpt-oss-120b:free is currently the highest-
    # capacity free OpenRouter model with native tool calling / structured
    # output (needed for generate_structured's forced emit_post tool call) —
    # verified July 2026. Swap base_url/model for NVIDIA NIM or Gemini per
    # docs/superpowers/specs/2026-07-10-chunk14-llm-provider-keys-design.md
    # if this one's rate limits or quality don't hold up.
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-oss-120b:free"
    api_key_env: "OPENAI_COMPAT_API_KEY"

# Deterministic post-generation styling: brand color pinning + layout selection
# (no LLM involved, applied after the model returns its theme/content).
styles:
  brand_colors:
    nvidia:     {primary: "#76B900", secondary: "#0A0A0A", accent: "#FFFFFF", mood: dark}
    anthropic:  {primary: "#D97757", secondary: "#F5F0E8", accent: "#1A1A1A", mood: light}
    openai:     {primary: "#10A37F", secondary: "#0A0A0A", accent: "#FFFFFF", mood: dark}
    google:     {primary: "#4285F4", secondary: "#0A0A0A", accent: "#FFFFFF", mood: dark}
    meta:       {primary: "#0668E1", secondary: "#0A0A0A", accent: "#FFFFFF", mood: dark}
    microsoft:  {primary: "#00A4EF", secondary: "#0A0A0A", accent: "#FFFFFF", mood: dark}
  layout_rules:
    breaking:  ["launch", "launches", "release", "releases", "announces", "unveils"]
    editorial: ["analysis", "opinion", "deep dive", "explainer", "why "]
  default_layout: slideshow

# Ingestion window (Phase 1): ignore items older than this many hours.
ingest:
  max_age_hours: 48
  per_source_limit: 25

# Selection / memory (Phase 2): how far back to look when deduping + detecting follow-ups.
select:
  lookback_days: 14
  # Virality-aware ranking: on top of source weight + recency, boost items that
  # read as high-interest. `entities` = hot names/products; `actions` = the kind
  # of event that tends to go viral. Each match list is capped (max_hits) so a
  # title stuffed with keywords can't dominate. Tune freely.
  interest:
    entity_bonus: 0.6        # per distinct entity hit (up to max_hits)
    action_bonus: 0.4        # per distinct action hit (up to max_hits)
    max_hits: 2
    entities:
      - openai, gpt, chatgpt, sora, codex
      - anthropic, claude
      - google, gemini, deepmind, android, pixel, waymo
      - nvidia, blackwell, cuda, rtx
      - amd, ryzen, radeon
      - intel, arc
      - apple, iphone, ipad, macbook, vision
      - microsoft, copilot, windows, azure
      - meta, llama, instagram, whatsapp, quest
      - tesla, spacex, starlink, xai, grok
      - amazon, aws, alexa
      - samsung, qualcomm, snapdragon, tsmc, arm
      - bitcoin, ethereum, crypto
    actions:
      - launch, launches, unveils, announces, reveals, releases, debut, ships
      - raises, funding, valuation, ipo, acquires, acquisition, merger, buys
      - lawsuit, sues, sued, fined, banned, antitrust, investigation
      - breach, hack, hacked, exploit, vulnerability, ransomware, leak, leaked
      - breakthrough, record, fastest, benchmark, outperforms, beats, first
      - layoffs, shutdown, recall, outage

jobs:
  max_attempts: 3
  base_delay_seconds: 5
  max_delay_seconds: 300
  poll_interval_seconds: 1.0

schedule:
  daily_run_time: "08:00"       # HH:MM local time for the self-triggered daily run
  drain_every_minutes: 60       # how often the scheduled-posts queue is drained
  weekly_report_weekday: 0      # 0=Monday
  weekly_report_time: "09:00"
  poll_interval_seconds: 30     # scheduler poll cadence (coarser than the job worker's)

logging:
  format: "text"   # "text" (human-readable, default) or "json" (RPi/headless)
  level: "INFO"
