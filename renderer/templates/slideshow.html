<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  /* Theme is injected as CSS custom properties at init time. */
  :root {
    --primary: #76B900;
    --secondary: #0A0A0A;
    --accent: #FFFFFF;
    --ink: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  body {
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
    background: var(--secondary);
    color: var(--ink);
    position: relative;
  }

  /* Animated gradient blobs — position is a deterministic function of time. */
  #bg { position: absolute; inset: 0; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%;
    filter: blur(90px); opacity: 0.55;
  }
  .blob.a { width: 900px; height: 900px; background: var(--primary); }
  .blob.b { width: 760px; height: 760px; background: var(--accent); opacity: 0.30; }
  #grain { position: absolute; inset: 0; opacity: 0.06;
    background-image: radial-gradient(var(--accent) 1px, transparent 1px);
    background-size: 4px 4px; }

  /* Stage holds the current slide. */
  #stage { position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: 140px 96px; gap: 40px; }

  #kicker {
    font-size: 34px; font-weight: 800; letter-spacing: 4px;
    text-transform: uppercase; color: var(--primary);
    display: inline-flex; align-items: center; gap: 16px;
  }
  #kicker .dot { width: 18px; height: 18px; border-radius: 50%;
    background: var(--primary); box-shadow: 0 0 24px var(--primary); }

  #headline { font-size: 104px; font-weight: 900; line-height: 1.02;
    letter-spacing: -2px; }
  #headline .bar { display: inline-block; height: 10px; width: 0;
    background: var(--primary); border-radius: 6px; margin-top: 28px; }

  #bullets { list-style: none; display: flex; flex-direction: column; gap: 30px;
    margin-top: 20px; }
  #bullets li { font-size: 46px; font-weight: 600; line-height: 1.25;
    display: flex; gap: 24px; align-items: flex-start; opacity: 0; }
  #bullets li::before { content: ""; flex: 0 0 auto; width: 22px; height: 22px;
    margin-top: 16px; border-radius: 6px; background: var(--primary);
    box-shadow: 0 0 18px var(--primary); }

  /* Persistent channel watermark. */
  #handle { position: absolute; bottom: 70px; left: 0; right: 0;
    text-align: center; font-size: 32px; font-weight: 700;
    letter-spacing: 1px; opacity: 0.65; }

  /* Outro logo (last slide). */
  #outro { position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 48px; }
  #outro img { width: 360px; height: 360px; object-fit: contain;
    border-radius: 40px; }
  #outro .name { font-size: 64px; font-weight: 900; }
  #outro .cta { font-size: 40px; font-weight: 600; color: var(--primary); }

  body.light { --ink: #0A0A0A; }
</style>
</head>
<body>
  <div id="bg">
    <div class="blob a"></div>
    <div class="blob b"></div>
    <div id="grain"></div>
  </div>
  <div id="stage">
    <div id="kicker"><span class="dot"></span><span id="kicker-text">BREAKING</span></div>
    <h1 id="headline"><span id="headline-text"></span><br/><span class="bar"></span></h1>
    <ul id="bullets"></ul>
  </div>
  <div id="outro">
    <img id="outro-logo" alt="" />
    <div class="name" id="outro-name"></div>
    <div class="cta" id="outro-cta"></div>
  </div>
  <div id="handle"></div>

<script>
// Deterministic renderer driven entirely by an external clock (no RAF/random),
// so render.mjs gets identical output every run.
const S = { slides: [], theme: null, channel: null };
const el = (id) => document.getElementById(id);
const clamp01 = (x) => Math.max(0, Math.min(1, x));
const easeOut = (t) => 1 - Math.pow(1 - clamp01(t), 3);

window.__init = function (spec) {
  S.slides = spec.slides || [];
  S.theme = spec.theme || {};
  S.channel = spec.channel || {};
  const t = S.theme;
  const root = document.documentElement.style;
  if (t.primary) root.setProperty("--primary", t.primary);
  if (t.secondary) root.setProperty("--secondary", t.secondary);
  if (t.accent) root.setProperty("--accent", t.accent);
  if (t.mood === "light") document.body.classList.add("light");
  el("handle").textContent = S.channel.handle || "";
  if (S.channel.logo_data_uri) el("outro-logo").src = S.channel.logo_data_uri;
  el("outro-name").textContent = S.channel.name || "";
  el("outro-cta").textContent = "Follow for daily tech & AI";
  return S.slides.length;
};

// Position the animated background as a function of absolute time.
function paintBg(globalMs) {
  const a = el("bg").querySelector(".blob.a");
  const b = el("bg").querySelector(".blob.b");
  const s = globalMs / 1000;
  a.style.left = (140 + 120 * Math.sin(s * 0.6)) + "px";
  a.style.top = (180 + 160 * Math.cos(s * 0.5)) + "px";
  b.style.right = (120 + 140 * Math.sin(s * 0.4 + 1)) + "px";
  b.style.bottom = (220 + 130 * Math.cos(s * 0.7 + 2)) + "px";
}

// Render slide `i` at localMs within it. globalMs drives the background.
window.__render = function (i, localMs, globalMs) {
  paintBg(globalMs);
  const slide = S.slides[i] || {};
  const isOutro = i === S.slides.length - 1 && !!S.channel.logo_data_uri;

  el("outro").style.display = isOutro ? "flex" : "none";
  el("stage").style.display = isOutro ? "none" : "flex";
  if (isOutro) {
    const p = easeOut(localMs / 500);
    el("outro").style.opacity = p;
    el("outro-logo").style.transform = `scale(${0.85 + 0.15 * p})`;
    return;
  }

  // Kicker + headline entrance.
  el("kicker-text").textContent = (slide.kicker || (i === 0 ? "BREAKING" : "DETAILS"));
  el("headline-text").textContent = slide.headline || "";
  const hp = easeOut(localMs / 600);
  const h = el("headline");
  h.style.opacity = hp;
  h.style.transform = `translateY(${(1 - hp) * 40}px)`;
  h.querySelector(".bar").style.width = (easeOut((localMs - 300) / 500) * 320) + "px";

  // Staggered bullets.
  const ul = el("bullets");
  const bullets = slide.bullets || [];
  if (ul.dataset.k !== i + ":" + bullets.length) {
    ul.innerHTML = "";
    bullets.forEach((b) => { const li = document.createElement("li");
      li.textContent = b; ul.appendChild(li); });
    ul.dataset.k = i + ":" + bullets.length;
  }
  [...ul.children].forEach((li, k) => {
    const bp = easeOut((localMs - 500 - k * 220) / 500);
    li.style.opacity = bp;
    li.style.transform = `translateX(${(1 - bp) * -40}px)`;
  });
};
</script>
</body>
</html>
