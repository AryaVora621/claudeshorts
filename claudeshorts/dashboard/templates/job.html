{% extends "base.html" %}
{% block title %}Job {{ job.id }}{% endblock %}
{% block body %}
<h1>Job #{{ job.id }} — {{ job.name }}</h1>
<p class="sub">Status: <span class="badge {{ job.status }}" id="status">{{ job.status }}</span></p>

<div id="log">{% for line in job.lines %}{{ line }}
{% endfor %}</div>

<div class="row" style="margin-top:16px">
  <a class="btn" href="/">← Overview</a>
  <a class="btn" href="/review">Review queue</a>
  <a class="btn" href="/posts">Posts</a>
</div>

<script>
(function () {
  var done = {{ 'true' if job.done else 'false' }};
  if (done) return;
  var log = document.getElementById('log');
  var statusEl = document.getElementById('status');
  // Replay from scratch so we don't depend on what the page pre-rendered.
  log.textContent = '';
  var es = new EventSource('/jobs/{{ job.id }}/stream');
  es.onmessage = function (e) {
    log.textContent += e.data + '\n';
    log.scrollTop = log.scrollHeight;
  };
  es.addEventListener('done', function (e) {
    statusEl.textContent = e.data;
    statusEl.className = 'badge ' + e.data;
    es.close();
  });
  es.onerror = function () { es.close(); };
})();
</script>
{% endblock %}
