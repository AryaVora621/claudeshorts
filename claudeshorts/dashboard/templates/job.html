{% extends "base.html" %}
{% block title %}Job {{ job.id }}{% endblock %}
{% block body %}
<h1>Job #{{ job.id }} — {{ job.name }}</h1>
<p class="sub">Status: <span class="badge {{ job.status|lower }}" id="term-status">{{ job.status }}</span>
  · <a href="/jobs">all jobs →</a></p>

<div class="term">
  <div class="term-bars" id="term-bars"></div>
  <div class="term-log" id="term-log">{% for line in job.lines %}{{ line }}
{% endfor %}</div>
</div>

<div class="row" style="margin-top:16px">
  <a class="btn" href="/jobs">← All jobs</a>
  <a class="btn" href="/">Overview</a>
  <a class="btn" href="/review">Review queue</a>
  <a class="btn" href="/posts">Posts</a>
</div>

<script src="/static/jobs.js"></script>
<script>
  // Stream this job into the shared terminal (live lines + progress bars). For a
  // finished job the stream replays the stored log, then closes.
  JobsUI.attachTerminal({{ job.id }}, { logId: "term-log", barsId: "term-bars", statusId: "term-status" });
</script>
{% endblock %}
