{% extends "base.html" %}
{% block title %}Jobs{% endblock %}
{% block body %}
<h1>Jobs</h1>
<p class="sub">Background runs, newest first. Click any job to watch its terminal
  live. History survives a server restart.</p>

<div class="jobs-split">
  <div data-jobs-list data-jobs-mode="inline" data-limit="50" id="job-list">
    <p class="empty">Loading…</p>
  </div>

  <div class="term">
    <div class="term-head">
      <strong id="term-title">Select a job</strong>
      <span class="badge" id="term-status"></span>
    </div>
    <div class="term-bars" id="term-bars"></div>
    <div class="term-log" id="term-log"><span class="muted">Pick a job on the left to watch its terminal.</span></div>
  </div>
</div>

<script src="/static/jobs.js"></script>
{% endblock %}
